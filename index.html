    <p>Understanding citizen support for climate change mitigation policies in Spain</p>

<div class="project-body">
<section id="what-is-attclimate" class="level2">
<h2>What is ATTClimate?</h2>
<p><strong>ATTClimate</strong> (<em>Political Attitudes, Climate Change, and Support for Mitigation Policies</em>) is a research project that investigates how Spanish citizens form their opinions about climate change and the public policies designed to address it. At its core, the project asks: <em>who supports climate policies, why, and under what conditions?</em></p>
<p>Climate change is one of the defining challenges of our time, yet the implementation of effective mitigation policies depends critically on public support. Policies such as carbon taxes, low-emission zones, renewable energy subsidies, or restrictions on fossil fuels all entail real costs and trade-offs that citizens must accept for democracies to enact them. ATTClimate seeks to understand the political, social, and psychological factors that shape whether individuals back or oppose these measures.</p>
</section>
<section id="research-lines" class="level2">
<h2>Research Lines</h2>
<p>The project pursues three interconnected research lines:</p>
<p><strong>1. Attitudes towards climate change and extreme weather events.</strong> We examine how direct exposure to extreme climate events — droughts, floods, heatwaves — shapes individual attitudes towards climate change and their support for mitigation policies. Using panel survey data collected before and after major events (including the DANA flooding of October 2024), we assess whether lived experience with climate impacts translates into stronger or more durable policy support.</p>
<p><strong>2. Positions of political representatives.</strong> We analyse how political parties compete over climate change issues and how elected representatives vote on climate-related legislation. We study whether ideology conditions parliamentary behaviour after extreme weather events, and whether party dynamics amplify or suppress elite responsiveness to climate concerns.</p>
<p><strong>3. Support for mitigation policies: costs, redistribution, and experiments.</strong> Using survey experiments embedded in original data collections, we estimate how the framing of climate policies — in terms of economic costs, distributional consequences, or co-benefits — affects public acceptance. We pay particular attention to which social groups support or resist different policy instruments, and whether targeted compensation schemes can broaden coalitions behind ambitious climate action.</p>
</section>
<section id="data" class="level2">
<h2>Data</h2>
<p>ATTClimate has fielded four waves of original survey data (2023–2025) among the Spanish population, accumulating over 15,000 respondent-wave observations. The panel design allows us to track attitude change over time and link individual survey responses to real-world climate events. All harmonised data are available through the <a href="https://cora.csuc.cat/repositoris/">CORA research data repository</a>.</p>
</section>
<section id="funding" class="level2">
<h2>Funding</h2>
<p>The project is funded by the <strong>Spanish Ministry of Science and Innovation</strong> (MCIN/AEI/10.13039/501100011033) and the European Union NextGenerationEU/PRTR (reference: TED2021-132191B-I00). It is jointly developed by the Faculty of Law and Political Science at the <strong>Universitat Oberta de Catalunya (UOC)</strong> and the Department of Political and Social Sciences at the <strong>Universitat Pompeu Fabra (UPF)</strong>.</p>
</section>

          const elementsIds = ["code-annotation-line-highlight", "code-annotation-line-highlight-gutter"];
          elementsIds.forEach((elId) => {
            const div = window.document.getElementById(elId);
            if (div) {
              div.remove();
            }
          });
          selectedAnnoteEl = undefined;
        };
          // Handle positioning of the toggle
      window.addEventListener(
        "resize",
        throttle(() => {
          elRect = undefined;
          if (selectedAnnoteEl) {
            selectCodeLines(selectedAnnoteEl);
          }
        }, 10)
      );
      function throttle(fn, ms) {
      let throttle = false;
      let timer;
        return (...args) => {
          if(!throttle) { // first call gets through
              fn.apply(this, args);
              throttle = true;
          } else { // all the others get throttled
              if(timer) clearTimeout(timer); // cancel #2
              timer = setTimeout(() => {
                fn.apply(this, args);
                timer = throttle = false;
              }, ms);
          }
        };
      }
        // Attach click handler to the DT
        const annoteDls = window.document.querySelectorAll('dt[data-target-cell]');
        for (const annoteDlNode of annoteDls) {
          annoteDlNode.addEventListener('click', (event) => {
            const clickedEl = event.target;
            if (clickedEl !== selectedAnnoteEl) {
              unselectCodeLines();
              const activeEl = window.document.querySelector('dt[data-target-cell].code-annotation-active');
              if (activeEl) {
                activeEl.classList.remove('code-annotation-active');
              }
              selectCodeLines(clickedEl);
              clickedEl.classList.add('code-annotation-active');
            } else {
              // Unselect the line
              unselectCodeLines();
              clickedEl.classList.remove('code-annotation-active');
            }
          });
        }
    const findCites = (el) => {
      const parentEl = el.parentElement;
      if (parentEl) {
        const cites = parentEl.dataset.cites;
        if (cites) {
          return {
            el,
            cites: cites.split(' ')
          };
        } else {
          return findCites(el.parentElement)
        }
      } else {
        return undefined;
      }
    };
    var bibliorefs = window.document.querySelectorAll('a[role="doc-biblioref"]');
    for (var i=0; i<bibliorefs.length; i++) {
      const ref = bibliorefs[i];
      const citeInfo = findCites(ref);
      if (citeInfo) {
        tippyHover(citeInfo.el, function() {
          var popup = window.document.createElement('div');
          citeInfo.cites.forEach(function(cite) {
            var citeDiv = window.document.createElement('div');
            citeDiv.classList.add('hanging-indent');
            citeDiv.classList.add('csl-entry');
            var biblioDiv = window.document.getElementById('ref-' + cite);
            if (biblioDiv) {
              citeDiv.innerHTML = biblioDiv.innerHTML;
            }
            popup.appendChild(citeDiv);
          });
          return popup.innerHTML;
        });
      }
    }
  });
  </script>
